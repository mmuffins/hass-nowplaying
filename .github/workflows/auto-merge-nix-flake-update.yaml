name: Auto-merge Nix Flake Upates
on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  pr-auto-approve:
    runs-on: ubuntu-latest
    if: >-
      (github.event.pull_request.user.login == 'mmuffins')
      && github.repository == 'mmuffins/hass-nowplaying'
      && (contains(github.event.pull_request.labels.*.name, 'nix-flake-update'))
    steps:
      - name: Merge PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
